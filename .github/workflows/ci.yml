name: CI

on:
  push:
    branches: ["master", "main", "feat/windows-compat"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y gettext xz-utils
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov ruff mypy
          # Install parpar
          curl -fsSL https://github.com/animetosho/ParPar/releases/download/v0.4.5/parpar-v0.4.5-linux-static-amd64.xz | xz -d > /tmp/parpar
          sudo mv /tmp/parpar /usr/local/bin/parpar
          sudo chmod +x /usr/local/bin/parpar
          # Install nyuu
          sudo npm install -g nyuu --unsafe-perm

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov ruff mypy
          npm install nyuu @animetosho/parpar

      - name: Add node_modules to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_PATH -Value "$(Get-Location)\node_modules\.bin"

      - name: Debug Paths (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ls -F node_modules/.bin || echo "node_modules/.bin not found"
          # Check for nyuu and parpar (officially parpar on Windows npm installs as parpar.cmd)
          which nyuu || echo "nyuu not found in PATH"
          which parpar || echo "parpar not found in PATH"
          parpar --version || echo "parpar --version failed"

      - name: Lint (ruff)
        shell: bash
        run: ruff check upapasta/ tests/

      - name: Type check (mypy)
        shell: bash
        run: mypy upapasta/ --strict

      - name: Check i18n (msgfmt)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          msgfmt --check upapasta/locale/pt_BR/LC_MESSAGES/upapasta.po

      - name: Test (pytest)
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            export PATH="$PATH:$(pwd)/node_modules/.bin"
          fi
          export UPAPASTA_LANG=en
          pytest tests/ -v --tb=short
          export UPAPASTA_LANG=pt_BR
          pytest tests/ -v --tb=short
