name: CI

on:
  push:
    branches: ["master", "main", "feat/windows-compat"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y gettext xz-utils
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov ruff mypy
          # Install parpar
          curl -fsSL https://github.com/animetosho/ParPar/releases/download/v0.4.5/parpar-v0.4.5-linux-static-amd64.xz | xz -d > /tmp/parpar
          sudo mv /tmp/parpar /usr/local/bin/parpar
          sudo chmod +x /usr/local/bin/parpar
          # Install nyuu
          sudo npm install -g nyuu --unsafe-perm

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov ruff mypy
          pip install parpar
          npm install -g nyuu
          # Add Python Scripts and NPM to PATH
          echo "$(python -c 'import sysconfig; print(sysconfig.get_path("scripts"))')" >> $GITHUB_PATH
          echo "$(npm config get prefix)" >> $GITHUB_PATH

      - name: Debug Paths (Windows)
        if: runner.os == 'Windows'
        run: |
          where nyuu || echo "nyuu not found"
          where parpar || echo "parpar not found"
          echo "PATH=$PATH"

      - name: Lint (ruff)
        run: ruff check upapasta/ tests/

      - name: Type check (mypy)
        run: mypy upapasta/ --strict

      - name: Check i18n (msgfmt)
        if: runner.os == 'Linux'
        run: |
          msgfmt --check upapasta/locale/pt_BR/LC_MESSAGES/upapasta.po

      - name: Test (pytest)
        shell: bash
        run: |
          export UPAPASTA_LANG=en
          pytest tests/ -v --tb=short
          export UPAPASTA_LANG=pt_BR
          pytest tests/ -v --tb=short
