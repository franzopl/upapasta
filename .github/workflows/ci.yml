name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install parpar
        run: |
          curl -fsSL https://github.com/animetosho/ParPar/releases/download/v0.4.5/parpar-v0.4.5-linux-static-amd64.xz | xz -d > /usr/local/bin/parpar
          chmod +x /usr/local/bin/parpar

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest ruff mypy

      - name: Lint (ruff)
        run: ruff check upapasta/ tests/

      - name: Type check (mypy)
        run: mypy upapasta/ --strict

      - name: Check i18n (msgfmt)
        run: |
          sudo apt-get update && sudo apt-get install -y gettext
          msgfmt --check upapasta/locale/pt_BR/LC_MESSAGES/upapasta.po

      - name: Check for missing i18n
        run: |
          # Detect print() calls that are not wrapped in _()
          # We exclude known exceptions or just warn
          grep -r 'print(' upapasta/ | grep -v '_(' || true

      - name: Test (pytest)
        run: |
          UPAPASTA_LANG=en pytest tests/ -v --tb=short
          UPAPASTA_LANG=pt_BR pytest tests/ -v --tb=short
